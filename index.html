<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Schützenjugend Bestenliste</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .hidden { display: none !important; }
        .trainer-only-badge { 
            background: var(--primary); 
            color: white; 
            font-size: 0.7rem; 
            padding: 2px 6px; 
            border-radius: 4px; 
            margin-left: 8px;
            font-weight: 800;
        }
        .btn-delete-entry {
            background: none;
            border: none;
            color: var(--danger);
            padding: 5px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .btn-delete-entry:hover { opacity: 1; }
    </style>
    
    <!-- PWA & Icons -->
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/jpeg" href="icons/wappen.jpg">
    <link rel="apple-touch-icon" href="icons/wappen.jpg">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="glass-header">
            <div class="header-logo-container">
                <img src="icons/wappen.jpg" alt="Wappen" class="header-logo">
                <div class="header-titles">
                    <h1>Schützenjugend</h1>
                    <p class="subtitle">Tages-Bestenliste</p>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="main-content">
            <!-- View: Bestenliste -->
            <section id="view-leaderboard" class="view active">
                <div class="leaderboard-container">
                    <ul id="leaderboard-list">
                        <!-- Items will be injected by JS -->
                        <div class="loading-spinner"></div>
                    </ul>
                    <button id="btn-share-leaderboard" class="btn-secondary trainer-only hidden" style="margin-top: 1rem;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                        <span>Ergebnisse Teilen (Trainer)</span>
                    </button>
                    <button id="btn-clear-data" class="btn-danger trainer-only hidden" style="margin-top: 0.5rem; opacity: 0.7;">
                        <span>Alle Daten löschen</span>
                    </button>
                </div>
            </section>

            <!-- View: Ergebnis eintragen -->
            <section id="view-submit" class="view">
                <div class="form-card glass-card">
                    <h2>Neues Ergebnis</h2>
                    <form id="score-form">
                        <div class="input-group">
                            <label for="shooter-name">Schütze</label>
                            <input type="text" id="shooter-name" placeholder="Name eingeben..." required autocomplete="off">
                            <ul id="name-suggestions" class="suggestions-list hidden"></ul>
                        </div>
                        
                        <div class="input-group">
                            <label>Serien (je max. 100 Ringe)</label>
                            <div class="series-inputs">
                                <div class="score-input-wrapper small">
                                    <span class="series-label">S1</span>
                                    <input type="number" id="serie-1" class="serie-input" min="0" max="100" placeholder="0" required>
                                </div>
                                <div class="score-input-wrapper small">
                                    <span class="series-label">S2</span>
                                    <input type="number" id="serie-2" class="serie-input" min="0" max="100" placeholder="0" required>
                                </div>
                                <div class="score-input-wrapper small">
                                    <span class="series-label">S3</span>
                                    <input type="number" id="serie-3" class="serie-input" min="0" max="100" placeholder="0" required>
                                </div>
                                <div class="score-input-wrapper small">
                                    <span class="series-label">S4</span>
                                    <input type="number" id="serie-4" class="serie-input" min="0" max="100" placeholder="0" required>
                                </div>
                            </div>
                        </div>

                        <div class="total-score-display">
                            <span class="total-label">Gesamt:</span>
                            <span id="total-score-value">0</span>
                            <span class="total-max">/ 400</span>
                        </div>

                        <button type="submit" class="btn-primary">
                            <span>Eintragen</span>
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="icon"><path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </button>
                    </form>
                </div>
            </section>
            <!-- View: Profil / Login -->
            <section id="view-profile" class="view">
                <div class="form-card glass-card" id="login-container">
                    <h2 id="auth-title">Anmelden</h2>
                    <p class="subtitle" style="margin-top: -1rem; margin-bottom: 1.5rem; text-align: center;">Um deine eigenen Ergebnisse zu speichern</p>
                    
                    <form id="auth-form">
                        <div class="input-group" id="name-group" style="display: none;">
                            <label for="auth-name">Dein Name (Wie in der Liste)</label>
                            <input type="text" id="auth-name" placeholder="Name eingeben..." autocomplete="off">
                        </div>

                        <div class="input-group">
                            <label for="auth-email">E-Mail</label>
                            <input type="email" id="auth-email" placeholder="E-Mail Adresse..." required autocomplete="email">
                        </div>

                        <div class="input-group">
                            <label for="auth-password">Passwort</label>
                            <input type="password" id="auth-password" placeholder="Passwort..." required autocomplete="current-password">
                        </div>

                        <button type="submit" class="btn-primary" id="btn-auth-submit">
                            <span>Anmelden</span>
                        </button>
                    </form>
                    
                    <div style="text-align: center; margin-top: 1rem;">
                        <button id="btn-toggle-auth" style="background:none; border:none; color:var(--primary); text-decoration:underline; font-size:0.9rem; cursor:pointer;">
                            Noch kein Account? Hier registrieren
                        </button>
                    </div>
                </div>

                <div class="form-card glass-card hidden" id="profile-container" style="display: none;">
                    <h2>Mein Profil</h2>
                    <div class="user-details" style="margin-bottom: 1.5rem; text-align: center;">
                        <div style="width: 80px; height: 80px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 2rem; color: var(--primary);">👤</div>
                        <h3 id="profile-name-display" style="font-size: 1.5rem;">User</h3>
                        <p id="profile-email-display" class="subtitle">email@example.com</p>
                    </div>
                    
                    <button id="btn-logout" class="btn-secondary" style="margin-bottom: 1rem;">
                        <span>Abmelden</span>
                    </button>
                    
                    <h3 style="margin-top:2rem; margin-bottom: 1rem; font-size: 1.2rem; border-bottom: 1px solid var(--card-border); padding-bottom: 0.5rem;">Meine Historie</h3>
                    <ul id="personal-history-list" style="list-style: none; display: flex; flex-direction: column; gap: 0.5rem;">
                        <div class="loading-spinner"></div>
                    </ul>
                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-target="view-leaderboard">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V10M18 20V4M6 20v-4"/></svg>
                <span>Ranking</span>
            </button>
            <button class="nav-item focus-action" data-target="view-submit">
                <div class="fab">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                </div>
            </button>
            <button class="nav-item" data-target="view-profile">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span id="nav-profile-text">Login</span>
            </button>
        </nav>
        
        <!-- Toast Notification Container -->
        <div id="toast-container"></div>
    </div>

    <!-- App Logic -->
    <script>
        // Service Worker Registrierung
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(registration => {
                    console.log('[PWA] Service Worker erfolgreich registriert:', registration.scope);
                }).catch(err => {
                    console.error('[PWA] Service Worker Registrierung fehlgeschlagen:', err);
                });
            });
        }
    </script>
    <script type="module" src="app.js"></script>
</body>
</html>
